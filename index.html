<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti, mi amor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --aubergine: #2B1B2F;
    --aubergine-deep: #1C1120;
    --parchment: #F7ECDE;
    --rose: #E85C6B;
    --gold: #F4A64B;
    --magenta: #7A2E4A;
    --cream: #FDF6EE;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background: var(--aubergine-deep);
    color: var(--cream);
    font-family: 'Lora', serif;
    min-height:100vh;
    overflow-x:hidden;
  }

  ::selection{ background: var(--rose); color: var(--cream); }

  /* ---------- INTRO ---------- */
  #intro{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 60%, var(--aubergine) 0%, var(--aubergine-deep) 75%);
    z-index:100;
    cursor:pointer;
    overflow:hidden;
    transition: opacity 1.1s ease, visibility 1.1s ease;
  }
  #intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .tulip{
    position:absolute;
    left:50%; top:55%;
    width:26px; height:34px;
    transform-origin: 50% 100%;
    opacity:0;
  }
  #intro.burst .tulip{
    animation: fly 1.8s cubic-bezier(.17,.84,.44,1) forwards;
  }
  @keyframes fly{
    0%{ opacity:0; transform: translate(-50%,-50%) rotate(var(--rot)) translateY(0) scale(.2); }
    12%{ opacity:1; }
    75%{ opacity:1; }
    100%{ opacity:0; transform: translate(-50%,-50%) rotate(var(--rot)) translateY(var(--dist)) scale(1); }
  }

  .intro-text{
    position:relative; z-index:5;
    text-align:center;
    opacity:0;
    transform: translateY(14px);
    transition: opacity 1.2s ease 1.1s, transform 1.2s ease 1.1s;
  }
  #intro.burst .intro-text{ opacity:1; transform:translateY(0); }

  .intro-text h1{
    font-family:'Parisienne', cursive;
    font-size: clamp(2.6rem, 8vw, 5rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(244,166,75,.35);
  }
  .intro-text p{
    margin-top:.6rem;
    font-family:'Poppins', sans-serif;
    font-weight:300;
    letter-spacing:.08em;
    font-size:.85rem;
    color: rgba(253,246,238,.75);
    text-transform:uppercase;
  }

  .tap-hint{
    position:absolute; bottom:8%; left:0; right:0;
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-size:.75rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color: rgba(253,246,238,.5);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.4;} 50%{opacity:1;} }

  /* ---------- MAIN ---------- */
  #main{
    max-width: 760px;
    margin: 0 auto;
    padding: 5rem 1.5rem 6rem;
    opacity:0;
    transition: opacity 1s ease;
  }
  #main.show{ opacity:1; }

  .eyebrow{
    font-family:'Poppins', sans-serif;
    text-transform:uppercase;
    letter-spacing:.2em;
    font-size:.7rem;
    color: var(--rose);
    text-align:center;
  }
  .headline{
    font-family:'Parisienne', cursive;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    color: var(--gold);
    text-align:center;
    margin: .4rem 0 .3rem;
  }
  .sub{
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-weight:300;
    font-size:.9rem;
    color: rgba(253,246,238,.65);
    margin-bottom: 3rem;
  }

  /* letter card */
  .letter{
    background: var(--parchment);
    color: #3A2A28;
    border-radius: 4px;
    padding: 2.6rem 2.2rem;
    box-shadow: 0 25px 60px rgba(0,0,0,.45), 0 2px 0 rgba(0,0,0,.08) inset;
    position: relative;
    margin-bottom: 2.4rem;
  }
  .letter::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:6px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
  }
  .letter .date{
    font-family:'Poppins', sans-serif;
    font-size:.7rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: var(--magenta);
    margin-bottom:1rem;
  }
  .letter .body-text{
    font-size: 1.08rem;
    line-height:1.85;
    white-space: pre-wrap;
  }
  .letter .signoff{
    margin-top:1.4rem;
    font-family:'Parisienne', cursive;
    font-size:1.6rem;
    color: var(--magenta);
    text-align:right;
  }

  .song-block{
    margin-top: 1.8rem;
    padding-top: 1.6rem;
    border-top: 1px dashed rgba(122,46,74,.3);
  }
  .song-label{
    font-family:'Poppins', sans-serif;
    font-size:.7rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: var(--rose);
    margin-bottom:.6rem;
  }
  .song-quote{
    font-style: italic;
    font-size:1.02rem;
    color:#4a3634;
    margin-bottom: .9rem;
    line-height:1.6;
  }
  .song-embed iframe{
    width:100%; border-radius:10px; border:none;
  }

  .counter{
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-size:.85rem;
    letter-spacing:.16em;
    text-transform:uppercase;
    color: var(--gold);
    margin-bottom: .6rem;
    font-weight:500;
  }

  .countdown{
    margin-top: 1.6rem;
    text-align:center;
    background: rgba(253,246,238,.05);
    border: 1px dashed rgba(253,246,238,.2);
    border-radius: 10px;
    padding: 1.1rem 1rem;
    font-family:'Poppins', sans-serif;
  }
  .countdown .cd-label{
    font-size:.72rem; letter-spacing:.12em; text-transform:uppercase;
    color: rgba(253,246,238,.55); margin-bottom:.4rem;
  }
  .countdown .cd-time{
    font-size:1.4rem; color: var(--gold); font-weight:500;
    font-variant-numeric: tabular-nums;
  }

  .empty-state{
    text-align:center;
    font-family:'Poppins', sans-serif;
    font-weight:300;
    color: rgba(253,246,238,.55);
    padding: 3rem 1rem;
    border: 1px dashed rgba(253,246,238,.2);
    border-radius: 10px;
    margin-bottom: 2rem;
  }

  /* archive */
  .archive-title{
    font-family:'Poppins', sans-serif;
    font-size:.75rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color: rgba(253,246,238,.5);
    margin: 3rem 0 1rem;
    text-align:center;
  }
  .archive-list{
    display:flex; flex-direction:column; gap:.6rem;
  }
  .archive-item{
    background: rgba(253,246,238,.05);
    border: 1px solid rgba(253,246,238,.1);
    border-radius: 8px;
    padding: .9rem 1.1rem;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer;
    font-family:'Poppins', sans-serif;
    font-size:.85rem;
    transition: background .2s ease, border-color .2s ease;
  }
  .archive-item:hover{ background: rgba(232,92,107,.12); border-color: var(--rose); }
  .archive-item .d{ color: var(--gold); font-weight:500; }
  .archive-item .t{ color: rgba(253,246,238,.7); flex:1; margin-left:1rem; text-align:right; }

  .choices-block{
    margin-top: 1.8rem;
    padding-top: 1.6rem;
    border-top: 1px dashed rgba(122,46,74,.3);
  }
  .choices-toggle{
    width:100%;
    background: linear-gradient(135deg, var(--rose), var(--magenta));
    color:#fff; border:none; padding:.9rem 1.1rem; border-radius:8px;
    font-family:'Poppins', sans-serif; font-size:.9rem; font-weight:500;
    cursor:pointer;
  }
  .choices-panel{ display:flex; flex-direction:column; gap:.6rem; margin-top:.9rem; }
  .choices-panel[hidden]{ display:none; }
  .choice-btn{
    text-align:left; background:#fff; border:1px solid rgba(122,46,74,.25);
    border-radius:8px; padding:.8rem 1rem; font-family:'Lora', serif;
    font-size:.98rem; cursor:pointer; color:#3A2A28;
  }
  .choice-btn:hover{ background: rgba(232,92,107,.08); border-color: var(--rose); }
  .note-toggle{
    width:100%;
    background: linear-gradient(135deg, var(--gold), var(--rose));
    color:#fff; border:none; padding:.9rem 1.1rem; border-radius:8px;
    font-family:'Poppins', sans-serif; font-size:.9rem; font-weight:500;
    cursor:pointer;
  }
  .note-toggle[hidden]{ display:none; }
  .quote-toggle{
    width:100%;
    background: linear-gradient(135deg, var(--magenta), var(--rose));
    color:#fff; border:none; padding:.8rem 1rem; border-radius:8px;
    font-family:'Poppins', sans-serif; font-size:.85rem; font-weight:500;
    cursor:pointer; margin-bottom:.6rem;
  }
  .quote-toggle[hidden]{ display:none; }
  .quote-reveal[hidden]{ display:none; }
  .words-burst{ position:relative; height:56px; }
  .word-span{
    position:absolute; top:100%;
    font-family:'Parisienne', cursive; font-size:1.35rem; color: var(--rose);
    animation: roseFloat 2.4s ease-out forwards; white-space:nowrap;
  }
  .choice-reveal{ position:relative; text-align:center; padding:2.2rem 0 1rem; overflow:hidden; }
  .choice-reveal[hidden]{ display:none; }
  .reveal-text{
    position:relative; z-index:2;
    font-family:'Parisienne', cursive; font-size:2.3rem; color: var(--rose);
  }
  .roses-burst{ position:absolute; inset:0; pointer-events:none; }
  .rose-emoji{
    position:absolute; top:100%; font-size:1.4rem;
    animation: roseFloat 2.4s ease-out forwards;
  }
  @keyframes roseFloat{
    0%{ transform: translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    100%{ transform: translateY(-170px) rotate(340deg); opacity:0; }
  }

  .special-gate{
    position:relative; overflow:hidden;
    background: var(--parchment); border-radius: 4px;
    padding: 3.6rem 2rem; text-align:center; cursor:pointer;
    box-shadow: 0 25px 60px rgba(0,0,0,.45);
    margin-bottom: 2.4rem;
  }
  .special-icon{ font-size:2.4rem; margin-bottom:.8rem; }
  .special-hint{
    font-family:'Poppins', sans-serif; color:#7A2E4A; font-size:.9rem; letter-spacing:.03em;
  }
  .tulip-rain{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .tulip-mini{ position:absolute; top:-40px; width:22px; height:28px; }
  @keyframes tulipFall{
    0%{ transform: translateY(-40px) rotate(0deg); opacity:0; }
    15%{ opacity:1; }
    100%{ transform: translateY(240px) rotate(200deg); opacity:0; }
  }
  .tulip-mini.falling{ animation: tulipFall 2.2s ease-in forwards; }

  .special-note{
    background: var(--parchment); border-radius: 4px; padding: 3rem 2rem; text-align:center;
    box-shadow: 0 25px 60px rgba(0,0,0,.45); margin-bottom: 2.4rem;
  }
  .special-note-text{
    font-family:'Parisienne', cursive; font-size:1.9rem; color: var(--magenta);
    line-height:1.5; margin-bottom:1.8rem;
  }
  .btn-continue{
    font-family:'Poppins', sans-serif; font-size:.85rem; font-weight:500;
    padding:.75rem 1.5rem; border-radius:6px; border:none; cursor:pointer;
    background: var(--rose); color:#fff;
  }

  .letter-hint{
    font-family:'Poppins', sans-serif; font-size:.78rem; font-style:italic;
    color: var(--rose); margin-bottom:1rem;
  }

  .modal-overlay{
    position:fixed; inset:0; background: rgba(15,8,17,.75);
    display:none; align-items:center; justify-content:center;
    z-index:80; padding:1.2rem;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background: var(--parchment); color:#3A2A28;
    width:100%; max-width:480px; border-radius:10px;
    padding: 1.8rem; max-height:88vh; overflow-y:auto;
  }
  .btn{
    font-family:'Poppins', sans-serif; font-size:.85rem; font-weight:500;
    padding:.65rem 1.2rem; border-radius:6px; border:none; cursor:pointer;
  }
  .btn-ghost{ background:transparent; color: var(--magenta); border:1px solid rgba(122,46,74,.3); width:100%; margin-top:1.2rem; }

  .archive-item:focus-visible, .btn:focus-visible{
    outline: 2px solid var(--gold); outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .tulip, .tap-hint, .intro-text{ animation: none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div id="intro">
  <div class="intro-text">
    <h1>Hola, mi amor</h1>
    <p>Toca la pantalla para abrir tu regalo</p>
  </div>
  <div class="tap-hint">toca aquí</div>
</div>

<div id="main">
  <div class="eyebrow">La carta de hoy</div>
  <h2 class="headline">Para ti</h2>
  <p class="sub">Un espacio que voy a ir llenando, día tras día, solo para nosotros dos.</p>
  <div class="counter" id="counter-label"></div>

  <div id="today-slot"></div>
  <div id="countdown-slot"></div>

  <div class="archive-title">Cartas anteriores</div>
  <div class="archive-list" id="archive-list"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
/* ============================================================
   CÓMO AGREGAR LA CARTA DE UN NUEVO DÍA
   ------------------------------------------------------------
   1. Copia este bloque y pégalo dentro del arreglo CARTAS,
      justo antes del corchete de cierre "]":

   {
     date: "2026-07-13",
     text: "Aquí va el texto de tu carta...",
     spotify: "https://open.spotify.com/track/XXXXXXXX",
     quote: "La frase de la canción que le quieras dedicar"
   },

   2. Cambia la fecha (formato AAAA-MM-DD), el texto, el link
      de Spotify y la frase. NO le pongas "unlockNow: true" —
      esa propiedad es solo para la primera carta, que se ve
      de inmediato sin esperar las 8pm.
   3. Guarda el archivo y sube el cambio a GitHub (commit + push).
   4. La carta se desbloquea sola a las 8:00 pm de esa fecha.
   ============================================================ */

const CARTAS = [
  {
    date: "2026-07-12",
    unlockNow: true,
    text: "Hola amor de mi vida, quiero decirte en esta pequeña cartita que eres y siempre serás la motivación de mis días, con lo que más me gusta soñar en mis noches y quien no sale de mis pensamientos en ningún segundo del día. Me siento muy afortunado de despertar y ver en una foto o en un mensaje todo tu amor. Gracias por amarme tanto y demostrármelo tanto, eres todo lo que más amo en esta vida, y por eso decido que hoy escuches esta canción, una de las nuestras, pero que me recuerda todos los días la mujer tan hermosa que tengo a mi lado.",
    spotify: "https://open.spotify.com/intl-es/track/3rL3VBUNUf9sSOv0RAQTBT?si=3dff8a6c864d4594",
    quote: "Eres linda y no me canso de mirarte, ¡qué suerte la mía de poder amarte, de poder tenerte, de poder besarte!"
  },
  {
    date: "2026-07-13",
    text: "Cartita de hoy para el amor de mi vida, hoy quería decirte que me impresiona la forma en que más me enamoro de ti día con día, de que amo y deseo tu cuerpo como desde esa primera vez que te vi, amo cada cosa que eres y representas, y puedo decir que me he enamorado de cada una de tus locuras, y que no pienso pasar un día de mi vida sin ellas. Y te prometo que cada día voy a hacer hasta lo imposible por hacerte sentir la mujer más amada del mundo.",
    spotify: "https://open.spotify.com/intl-es/track/58sCyRSFBV0m60kbV9rtp9?si=29507c00ea5444f5",
    quote: "No creas que dejaré de enamorarte"
  },
  {
    date: "2026-07-14",
    text: "Mi preciosa hermosa, la cartita de hoy no es como las otras, es mucho más especial: quería recordarte que en 10 días vamos a estar juntos. Nos vamos a volver a ver y no nos vamos a separar en un buen tiempo. Vamos a volver a tomarnos la manita, a caminar juntos, a darnos ese besito de amor que tanta falta nos hace. Me hace muy feliz y me llena de mucha felicidad todo lo que hemos crecido y lo que seguimos formando juntos. No aguanto el momento de verte y estar a tu lado, me haces mucha falta y no dejo de pensar ni un segundo en que ya voy a volver a tocarte y sentirte, aunque también te siento sin estar presentes, porque nunca nos abandonamos. Necesito ya estar cerca del amor de mi vida, pero empieza la cuenta regresiva para ver esa carita que amo, esos ojitos que iluminan mi vida, ese cuerpo que deseo, y me encanta que falta tan poco para ver al amor de mi vida.",
    spotify: "https://open.spotify.com/intl-es/track/6VQ2fI8goSX8mpSvytXkXR?si=c20ac8f9e72d411a",
    quote: "Que a besos yo te levante al rayar el día, y que el idilio perdure siempre al llegar la noche, y cuando venga la aurora llena de goce, se fundan en una sola tu alma y la mía",
    choices: [
      "1. Hacer el amor (te deseo mucho)",
      "2. Ir a un restaurante nuevo",
      "3. Ir a visitar algún postrecito de los que hemos visto"
    ]
  },
  {
    date: "2026-07-15",
    text: "Hola mi amorcito, oficialmente quedan 10 días para vernos, y quiero decirte que no dejo de pensar en la foto de la mañana, en cuánto amo tu cuerpo, cómo te deseo y cómo me encantas cada vez más. Quiero tenerte para mí todos los días de mi vida, hacerte mía miles de veces con el amor, el cariño y la pasión con la que siempre lo hemos hecho juntos. Sé que no es lo más importante y que primero van otras cosas, pero me encantas, te deseo, y no veo la hora de volver a tocar tu piel, sentirte, besarte, acariciarte, y tener nuestras almas juntas como siempre, mi amor hermosa. Te amo, me encantas, y me enamoras día a día.",

    quote: "Agradecido yo estoy con Dios, porque en mi vida está ella",

  {
    date: "2026-07-16",
    text: "Nueve días para nuestro reencuentro, y cada vez siento más cerca tu olor, tu esencia, tus risas, tus enojos — todo lo siento cada vez más cerca. Extraño tu voz, tus manos, todo, mi amor hermosa. Eres mi vida entera y te amo con locura. La cartita de hoy es para decirte que he planeado muchas cositas para nuestras semanas luego de vernos: citas, momentos únicos que ya quiero empezar a vivir. No aguanto más sin estar al lado de la mujer que amo, te necesito, mi amor, muchísimo, y te extraño como no te imaginas. Eres el verso más bonito que la vida me regaló, y mi corazón entero te pertenece, hoy, mañana y siempre.",
    spotify: "https://open.spotify.com/track/3lVYnZYyVvi95n5XjE2YCV?si=02J7FRQ1RnuG0HVqR9wHAA&utm_source=copy-link",

    quote: "Te dedico una nueva canción, mi amor hermosa, y quiero que sepas que te acompaño en cada paso de tu vida.",
    quote_hidden: true
  },
  {
    date: "2026-07-19",
    badge: "Carta doble 💌",
    hint: "Esta cartita está en italiano... ¿te animas a traducirla tú misma? 🇮🇹",
    intro_note: "Te amo con mi vida, eres lo más hermoso de mi existencia, y vivo muy orgulloso de mi mujer. Eres mi vida, y eres muy fuerte. No me vuelvas a asustar así.",
    text: "Ciao amore mio bellissima, so che questa è una letterina doppia, perché ieri ne è mancata una, ma voglio che ti illuda insieme a me perché mancano 6 giorni per rivederci, sono già molto emozionato, non vedo l'ora che tu torni e veda i regalini che ho preparato per noi due. Ti amo con tutta l'anima e manca davvero poco. Ti scrivo per farti sapere che penso a te giorno e notte, per farti sapere che ogni secondo che passa nella mia vita tu sei presente, non dimenticarlo mai, amore della mia vita. Voglio anche darti un indizio sul nostro primo appuntamento, quando saremo già a casa e avremo sbrigato le nostre faccende: faremo un mini viaggio di un giorno, dove vivremo nuove esperienze e ci connetteremo molto di più insieme, riposandoci un po', ma condividendo ogni momento, e sarà unico. Raccoglieremo tanti ricordi per poi trasformarli in qualcosa che ho preparato per noi due. Ti amoooo, so che starai pensando e vorrai che ti dia altri indizi, ma no, manca davvero poco e sarà bellissimo.",
    spotify: "https://open.spotify.com/intl-es/track/6cPLCU7hKjgjvLWzCevl7R?si=d8e3cb38c61f4d03",
    quote: "Non ricordo come, ma è entrato dentro di me ed è rimasto lì"
  }
];

const UNLOCK_HOUR = 20; // 8:00 pm

// ---------- Intro tulip burst ----------
const intro = document.getElementById('intro');
for(let i=0;i<26;i++){
  const t = document.createElement('div');
  t.className = 'tulip';
  const angle = Math.random()*360;
  const dist = 160 + Math.random()*260;
  t.style.setProperty('--rot', angle+'deg');
  t.style.setProperty('--dist', -dist+'px');
  t.style.animationDelay = (Math.random()*0.35)+'s';
  const hueSet = ['#E85C6B','#F4A64B','#F08FA0','#C2456B','#F7D0A0'];
  const color = hueSet[i % hueSet.length];
  t.innerHTML = `<svg viewBox="0 0 26 34" width="100%" height="100%">
    <path d="M13 34 L13 16" stroke="#5B8C5A" stroke-width="2" fill="none"/>
    <path d="M13 2 C4 2 3 12 13 20 C23 12 22 2 13 2 Z" fill="${color}"/>
    <path d="M13 6 C8 6 7.5 13 13 18" fill="none" stroke="rgba(0,0,0,.15)" stroke-width="1"/>
  </svg>`;
  intro.insertBefore(t, intro.firstChild);
}
function openIntro(){
  intro.classList.add('burst');
  setTimeout(()=>{
    intro.classList.add('hidden');
    document.getElementById('main').classList.add('show');
  }, 2600);
}
intro.addEventListener('click', openIntro, { once:true });

// ---------- Helpers ----------
function unlockTime(c){
  if(c.unlockNow) return new Date(0);
  const t = new Date(c.date + 'T00:00:00');
  t.setHours(UNLOCK_HOUR, 0, 0, 0);
  return t;
}
function unlockedCartas(){
  const now = new Date();
  return CARTAS.filter(c => unlockTime(c) <= now);
}
function getNextUnlock(now){
  const localDateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const todayCarta = CARTAS.find(c => c.date === localDateStr);
  const t = new Date(now);
  t.setHours(UNLOCK_HOUR, 0, 0, 0);
  const todayAlreadyUnlocked = todayCarta && (todayCarta.unlockNow || now >= t);
  if(todayAlreadyUnlocked || now >= t){ t.setDate(t.getDate() + 1); }
  return t;
}
function formatDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' });
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function spotifyEmbedUrl(link){
  try{
    const m = link.match(/open\.spotify\.com\/(?:intl-\w+\/)?(track|album|playlist)\/([a-zA-Z0-9]+)/);
    if(!m) return null;
    return `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`;
  }catch(e){ return null; }
}

function letterHTML(c){
  const embed = spotifyEmbedUrl(c.spotify || '');
  const choicesBlock = c.choices ? `
      <div class="choices-block">
        <button class="choices-toggle" type="button">Escoge lo que vamos a hacer cuando ya estemos en casa juntos 💕</button>
        <div class="choices-panel" hidden>
          ${c.choices.map((op,i) => `<button class="choice-btn" type="button" data-choice="${i}">${escapeHtml(op)}</button>`).join('')}
        </div>
        <div class="choice-reveal" hidden>
          <div class="roses-burst"></div>
          <div class="reveal-text">Te amo 💕</div>
        </div>
      </div>` : '';
  const noteBlock = c.countdown_note ? `
      <div class="choices-block">
        <button class="note-toggle" type="button">💕 Toca aquí</button>
        <div class="choice-reveal" hidden>
          <div class="roses-burst hearts-mode"></div>
          <div class="reveal-text">${escapeHtml(c.countdown_note)}</div>
        </div>
      </div>` : '';
  return `
    <div class="letter">
      <div class="date">${formatDate(c.date)}${c.badge ? ` · ${escapeHtml(c.badge)}` : ''}</div>
      ${c.hint ? `<div class="letter-hint">${escapeHtml(c.hint)}</div>` : ''}
      <div class="body-text">${escapeHtml(c.text)}</div>
      <div class="signoff">Te amo</div>
      ${(c.spotify || c.quote) ? `
      <div class="song-block">
        <div class="song-label">Nuestra canción de hoy</div>
        ${c.quote ? (c.quote_hidden ? `
          <button class="quote-toggle" type="button">Toca para ver la frase de hoy 💌</button>
          <div class="quote-reveal" hidden>
            <div class="words-burst"></div>
            <div class="song-quote">${escapeHtml(c.quote)}</div>
          </div>` : `<div class="song-quote">${escapeHtml(c.quote)}</div>`) : ''}
        ${embed ? `<div class="song-embed"><iframe src="${embed}" height="152" allow="encrypted-media"></iframe></div>` : (c.spotify ? `<a href="${c.spotify}" target="_blank" style="color:#7A2E4A;">Escuchar en Spotify</a>` : '')}
      </div>` : ''}
      ${choicesBlock}
      ${noteBlock}
    </div>
  `;
}

function spawnEmojis(container, emoji){
  container.innerHTML = '';
  for(let i=0;i<20;i++){
    const r = document.createElement('span');
    r.className = 'rose-emoji';
    r.textContent = emoji;
    r.style.left = (Math.random()*94)+'%';
    r.style.animationDelay = (Math.random()*0.5)+'s';
    r.style.fontSize = (16+Math.random()*16)+'px';
    container.appendChild(r);
  }
}

function spawnWords(container, phrase){
  container.innerHTML = '';
  const words = phrase.split(' ');
  words.forEach((w,i) => {
    const s = document.createElement('span');
    s.className = 'word-span';
    s.textContent = w;
    s.style.left = (6 + (i*80/words.length))+'%';
    s.style.animationDelay = (i*0.15)+'s';
    container.appendChild(s);
  });
}

function initChoices(root){
  const toggle = root.querySelector('.choices-toggle');
  if(toggle){
    const panel = root.querySelector('.choices-panel');
    const reveal = root.querySelector('.choice-reveal');
    toggle.addEventListener('click', () => { panel.hidden = !panel.hidden; });
    root.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        panel.hidden = true;
        reveal.hidden = false;
        spawnEmojis(reveal.querySelector('.roses-burst'), '🌹');
      });
    });
  }
  const noteToggle = root.querySelector('.note-toggle');
  if(noteToggle){
    const noteReveal = noteToggle.nextElementSibling;
    noteToggle.addEventListener('click', () => {
      noteReveal.hidden = false;
      spawnEmojis(noteReveal.querySelector('.roses-burst'), '💕');
      noteToggle.hidden = true;
    });
  }
  const quoteToggle = root.querySelector('.quote-toggle');
  if(quoteToggle){
    const quoteReveal = quoteToggle.nextElementSibling;
    quoteToggle.addEventListener('click', () => {
      quoteReveal.hidden = false;
      spawnWords(quoteReveal.querySelector('.words-burst'), 'Eres mi vida entera');
      quoteToggle.hidden = true;
    });
  }
}

let countdownTimer = null;
let specialOpened = false;

function renderCounter(){
  const el = document.getElementById('counter-label');
  const n = unlockedCartas().length;
  el.textContent = n === 0 ? '' : (n === 1 ? 'Carta 1' : `Carta ${n}`);
}

function renderToday(){
  const slot = document.getElementById('today-slot');
  const unlocked = unlockedCartas();
  if(unlocked.length === 0){
    slot.innerHTML = `<div class="empty-state">Todavía no hay carta disponible.<br>Vuelve pronto 🌷</div>`;
  }else{
    const c = unlocked[unlocked.length - 1];
    if(c.intro_note && !specialOpened){
      renderSpecialGate(slot, c);
    }else{
      slot.innerHTML = letterHTML(c);
      initChoices(slot);
    }
  }
  renderCounter();
  renderCountdown();
}

function renderSpecialGate(slot, c){
  slot.innerHTML = `
    <div class="special-gate" id="special-gate">
      <div class="tulip-rain" id="tulip-rain"></div>
      <div class="special-icon">🌷</div>
      <div class="special-hint">Toca para abrir tu cartita especial de hoy</div>
    </div>`;
  const gate = document.getElementById('special-gate');
  gate.addEventListener('click', function handler(){
    gate.removeEventListener('click', handler);
    spawnTulipRain(document.getElementById('tulip-rain'));
    setTimeout(() => showSpecialNote(slot, c), 1700);
  });
}

function spawnTulipRain(container){
  const hueSet = ['#E85C6B','#F4A64B','#F08FA0','#C2456B','#F7D0A0'];
  for(let i=0;i<24;i++){
    const t = document.createElement('div');
    t.className = 'tulip-mini falling';
    t.style.left = (Math.random()*94)+'%';
    t.style.animationDelay = (Math.random()*0.6)+'s';
    const color = hueSet[i % hueSet.length];
    t.innerHTML = `<svg viewBox="0 0 26 34" width="100%" height="100%">
      <path d="M13 34 L13 16" stroke="#5B8C5A" stroke-width="2" fill="none"/>
      <path d="M13 2 C4 2 3 12 13 20 C23 12 22 2 13 2 Z" fill="${color}"/>
    </svg>`;
    container.appendChild(t);
  }
}

function showSpecialNote(slot, c){
  slot.innerHTML = `
    <div class="special-note">
      <div class="special-note-text">${escapeHtml(c.intro_note)}</div>
      <button class="btn-continue" id="continue-btn" type="button">Seguir leyendo →</button>
    </div>`;
  document.getElementById('continue-btn').addEventListener('click', () => {
    specialOpened = true;
    slot.innerHTML = letterHTML(c);
    initChoices(slot);
  });
}

function renderCountdown(){
  const slot = document.getElementById('countdown-slot');
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }

  function tick(){
    const now = new Date();
    const target = getNextUnlock(now);
    const diff = target - now;
    if(diff <= 0){ renderToday(); renderArchive(); return; }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    slot.innerHTML = `
      <div class="countdown">
        <div class="cd-label">Tu siguiente cartita se desbloquea en</div>
        <div class="cd-time">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
      </div>`;
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function renderArchive(){
  const list = document.getElementById('archive-list');
  const unlocked = unlockedCartas();
  const prior = unlocked.slice(0, -1).reverse();

  if(prior.length === 0){
    list.innerHTML = `<div class="empty-state" style="margin-bottom:0;">Aquí irán apareciendo las cartas de días anteriores.</div>`;
    return;
  }

  list.innerHTML = prior.map((c) => `
    <div class="archive-item" tabindex="0" data-date="${c.date}">
      <span class="d">${formatDate(c.date)}</span>
      <span class="t">${c.quote ? escapeHtml(c.quote).slice(0,40) : escapeHtml(c.text).slice(0,40)}…</span>
    </div>`).join('');

  list.querySelectorAll('.archive-item').forEach(el => {
    el.addEventListener('click', () => {
      const c = CARTAS.find(x => x.date === el.dataset.date);
      showLetterModal(c);
    });
    el.addEventListener('keypress', (e) => { if(e.key === 'Enter') el.click(); });
  });
}

function showLetterModal(c){
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    ${letterHTML(c)}
    <button class="btn btn-ghost" id="close-view">Cerrar</button>`;
  initChoices(content);
  overlay.classList.add('open');
  document.getElementById('close-view').addEventListener('click', () => overlay.classList.remove('open'));
}
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if(e.target.id === 'modal-overlay') e.target.classList.remove('open');
});

// ---------- Init ----------
renderToday();
renderArchive();
</script>
</body>
</html>
